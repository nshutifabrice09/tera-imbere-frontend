<div class="app-layout">

  <div class="sidebar-overlay" [class.visible]="drawerOpen()" (click)="closeDrawer()"></div>

  <aside class="sidebar" [class.drawer-open]="drawerOpen()">
    <div class="s-logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="6" width="12" height="2" rx="1" fill="#5DCAA5"/>
          <rect x="6" y="1" width="2" height="12" rx="1" fill="#5DCAA5"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="brand-name">Tera Imbere</span>
        <span class="brand-sub">Personal banking</span>
      </div>
    </div>

    <nav class="s-nav">
      <a *ngFor="let item of nav"
         [routerLink]="item.route"
         routerLinkActive="active"
         class="s-item"
         (click)="closeDrawer()">
        <ti-nav-icon [route]="item.route"></ti-nav-icon>
        <span class="s-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="s-footer">
      <ng-container *ngIf="banking.currentUser() as user">
        <div class="user-row">
          <div class="avatar-sm">{{ user.initials }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-type">{{ user.accountType }}</span>
          </div>
        </div>
      </ng-container>
      <button class="sign-out-btn" (click)="logout()">Sign out</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <button class="hamburger" (click)="toggleDrawer()" aria-label="Open menu">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4.5h12M2 8h12M2 11.5h12"/>
        </svg>
      </button>
      <span class="page-title">
        {{ nav | titleByRoute : router.url }}
      </span>
      <div class="topbar-right">
        <span class="topbar-date">{{ today }}</span>
        <div class="avatar" *ngIf="banking.currentUser() as user">{{ user.initials }}</div>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
