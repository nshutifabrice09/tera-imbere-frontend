<div class="tx-row">
  <div class="tx-icon" [style.background]="iconBg">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"
         [attr.stroke]="banking.categoryColor(tx.category)"
         stroke-width="1.5" stroke-linecap="round">
      <path [attr.d]="tx.type === 'credit'
        ? 'M2 6.5h9M8 4l3 2.5-3 2.5'
        : 'M11 6.5H2M5 4L2 6.5 5 9'"/>
    </svg>
  </div>
  <div class="tx-info">
    <p class="tx-desc">{{ tx.description }}</p>
    <p class="tx-date">{{ tx.date }}</p>
  </div>
  <div class="tx-right">
    <p [class]="'tx-amount ' + tx.type">
      {{ tx.type === 'credit' ? '+' : '-' }}{{ banking.formatRWF(tx.amount) }}
    </p>
    <span [class]="'tx-badge ' + tx.type">
      {{ tx.type === 'credit' ? 'Credit' : 'Debit' }}
    </span>
  </div>
</div>
